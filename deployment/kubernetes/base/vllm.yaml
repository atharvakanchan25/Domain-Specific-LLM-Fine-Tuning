apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: ekllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm
  template:
    metadata:
      labels:
        app: vllm
    spec:
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          args:
            - "--model"
            - "meta-llama/Meta-Llama-3-8B-Instruct"
            - "--dtype"
            - "auto"
            - "--max-model-len"
            - "8192"
            - "--gpu-memory-utilization"
            - "0.85"
          ports:
            - containerPort: 8000
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ekllm-secrets
                  key: HF_TOKEN
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "24Gi"
            requests:
              memory: "16Gi"
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: hf-cache
          persistentVolumeClaim:
            claimName: hf-cache-pvc
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: vllm
  namespace: ekllm
spec:
  selector:
    app: vllm
  ports:
    - port: 8000
      targetPort: 8000
